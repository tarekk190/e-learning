<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ED Tech</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/bootstrap.min.css">
</head>

<body>

    <div class="page-wrapper">

        <div class="container">
            <div class="card game-card">

                <h3 class="title text-center">Create Your Player</h3>
                <p class="avatar-title">Choose Avatar</p>

                <div class="row g-4 avatar-grid">

                    <label class="col-md-4 foucs">
                        <input type="radio" name="avatar" hidden>
                        <div class="avatar-card">
                            <img src="image/robot.png" alt="">
                            <p>Robot</p>
                        </div>
                    </label>
                    <label class="col-md-4 foucs">
                        <input type="radio" name="avatar" hidden>
                        <div class="avatar-card">
                            <img src="image/explorer.jpg" alt="">
                            <p>explorer</p>
                        </div>
                    </label>
                    <label class="col-md-4 foucs">
                        <input type="radio" name="avatar" hidden>
                        <div class="avatar-card">
                            <img src="image/hacker kid.jpg" alt="">
                            <p>hacker</p>
                        </div>
                    </label>
                    <label class="col-md-4 foucs">
                        <input type="radio" name="avatar" hidden>
                        <div class="avatar-card">
                            <img src="image/scientest.jpg" alt="">
                            <p>scientest</p>
                        </div>
                    </label>
                    <label class="col-md-4 foucs">
                        <input type="radio" name="avatar" hidden>
                        <div class="avatar-card">
                            <img src="image/pirate.jpg" alt="">
                            <p>pirate</p>
                        </div>
                    </label>
                    <label class="col-md-4 foucs">
                        <input type="radio" name="avatar" hidden>
                        <div class="avatar-card">
                            <img src="image/astrounot.jpg" alt="">
                            <p>astrounot</p>
                        </div>
                    </label>
                    <div class="mt-4">
                        <label>Player Name</label>
                        <input id="playerName" type="text" class="form-control game-input" placeholder="Enter your hero name...">
                    </div>

                    <div class="mt-3">
                        <label>Age</label>
                        <input type="number" id="age" class="form-control game-input" placeholder="How old are you?">
                    </div>

                    <button class="join-btn mt-4">
                        <a href="/startGame.html">
                            Join the Game

                        </a>
                    </button>
                </div>
            </div>
        </div>





        <script src="javascript/bootstrap.bundle.min.js"></script>
        <script src="javascript/script.js"></script>
</body>

</html>
