<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Join the Adventure</title>
<link rel="stylesheet" href="steyl.css">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="bg-dark text-white d-flex align-items-center justify-content-center vh-100">

<div class="container">

<div class="text-start mb-3">
<a href="index.html" class="text-info text-decoration-none">← Back to Adventure</a>
</div>

<div class="row justify-content-center">

<div class="col-md-4">

<div class="card bg-dark border-info text-white shadow-lg rounded-4 p-4" style="background: radial-gradient(circle at top,#1e2a78,#3a0f5c,#12002c);">

<div class="text-center mb-3">
<div class="col-md-2 text-center">
<img src="IMG/6.jpg"
class="rounded-circle"
style="margin-left:135px;"
width="100"
height="100">

</div>
<h3 class="fw-bold">JOIN THE ADVENTURE!</h3>
<p class="text-info small">Create your account and start your tech journey</p>
</div>

<form>

<div class="mb-3">
<label class="form-label text-info fw-bold small">USERNAME</label>
<input type="text" class="form-control bg-dark text-white border-info" placeholder="Choose your hero name">
</div>

<div class="mb-3">
<label class="form-label text-info fw-bold small">EMAIL</label>
<input type="email" class="form-control bg-dark text-white border-info" placeholder="your@email.com">
</div>

<div class="mb-3">
<label class="form-label text-warning fw-bold small">PASSWORD</label>
<input type="password" class="form-control bg-dark text-white border-warning" placeholder="Create a secure password">
</div>

<div class="text-center">
<button class="start-btn">START YOUR ADVENTURE</button>
</div>


</form>

<p class="text-center small text-secondary mt-3">
By signing up, you agree to become the coolest tech hero ever! 🚀
</p>

</div>

</div>

</div>

</div>

</body>
</html>
