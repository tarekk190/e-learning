<!DOCTYPE html>
<html lang="ar" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Your Hero</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            background: radial-gradient(circle at center, #3a1c71, #1a0a33);
            font-family: 'Cairo', sans-serif;
            color: white;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .hero-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 2.5rem;
            width: 100%;
            max-width: 500px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5);
          
        }

        .gradient-text {
            background: linear-gradient(to right, #00d2ff, #f731db);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: bold;
        }

    

        .form-control {
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            border-radius: 10px;
            padding: 0.75rem;
        }

    

        .form-control::placeholder {
            color: rgba(255, 255, 255, 0.4);
        }

        .btn-launch {
            background: linear-gradient(to right, #ffcc33, #f731db);
            border: none;
            color: white;
            font-weight: bold;
            padding: 0.8rem;
            border-radius: 12px;
            width: 100%;
            margin-top: 1rem;
            transition: transform 0.2s;
        }

        .btn-launch:hover {
            transform: scale(1.02);
            color: rgb(243, 242, 242);
        }

        .back-link {
            position: absolute;
            top: 20px;
            left: 20px;
    
            color: #00d2ff;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>

    <a href="./index.html" class="back-link">← Back to Adventure</a>

    <div class="container d-flex flex-column align-items-center">

<div class="mb-3 text-center d-flex justify-content-center ">
    <img src="images (2).jpg" class="img-fluid rounded-circle"  style="width: 200px; max-width: 100%; height: auto;" alt="">
</div>



     

        <h1 class="display-5 gradient-text mb-1">Create Your Hero</h1>
        <p class="text-light opacity-75 mb-4">Your epic adventure starts here!</p>

        <div class="hero-card">
          
                <div class="mb-3">
                    <label class="form-label">👤 Hero Name (Username)</label>
                    <input type="text" class="form-control" placeholder="Choose your hero name...">
                </div>

                <div class="mb-3">
                    <label class="form-label">✉️ Email Address</label>
                    <input type="email" class="form-control" placeholder="your.email@example.com">
                </div>

                <div class="mb-3">
                    <label class="form-label">✨ Age</label>
                    <input type="number" class="form-control" placeholder="How old are you?">
                    <small class="text-info d-block mt-1">Ages 8-15 welcome!</small>
                </div>

                <div class="mb-4">
                    <label class="form-label">🔒 Secret Password</label>
                    <input type="password" class="form-control" placeholder="Create a strong password...">
                </div>

                <a href="/pickHero.html">
                <button type="submit" class="btn btn-launch">
                        ⚡ Launch My Adventure! 🏆

                    </button>
                </a>


                <div class="text-center mt-4">
    <span class="text-white-50">Already have an account?</span>
    <a href="loginhere.html" class="ms-1 text-decoration-none fw-bold" style="color: #00d2ff;">Login</a>
</div>
      
        </div>
    </div>

 
</body>
</html>










 <script src="js/bootstrap.bundle.min.js"></script>   
 <script src="js/script.js"></script>
</body>
</html>
